# Streamlit Secrets Configuration
# For local development, copy this to .streamlit/secrets.toml
# For Streamlit Cloud, add these in the app settings

[database]
# SQLite database path
# For local development:
path = "./data/stress_detection.db"

# For Streamlit Cloud with persistent storage:
# path = "/mnt/data/stress_detection.db"

[app]
# App configuration
debug = false
max_text_length = 5000

[security]
# Enable/disable features
enable_analytics = true
enable_feedback = true
require_user_consent = false

